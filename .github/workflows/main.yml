name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]   # daily refresh
  workflow_dispatch:                   # manual run button
  push: { branches: ["main"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: YAHYA280
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Casablanca
          # language breakdown
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          # 3D isometric contribution calendar — the "crazy" part
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # commit timeline / recent activity feed
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          # total lines of code added/removed across commits
          plugin_lines: yes
          # follower / star / repo totals as a notable panel
          plugin_notable: yes
          plugin_notable_repositories: yes
